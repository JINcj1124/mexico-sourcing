name: 每日选品日报

on:
  schedule:
    # UTC 02:00 = 北京时间 10:00 (CST)
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pydantic-settings sqlalchemy requests

      - name: 生成选品日报并推送飞书
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/daily_report.py
